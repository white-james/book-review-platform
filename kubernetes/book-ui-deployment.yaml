apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-ui
  namespace: book-review-platform
  labels:
    app: book-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: book-ui
  template:
    metadata:
      labels:
        app: book-ui
    spec:
      containers:
      - name: book-ui
        image: bookreviewdevacr.azurecr.io/book-ui:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: book-ui
  namespace: book-review-platform
spec:
  selector:
    app: book-ui
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer  # Exposes externally with public IP