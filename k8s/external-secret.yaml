apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-keyvault
  namespace: book-review-platform
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: "https://${KEY_VAULT_NAME}.vault.azure.net/"
      # Note: Replace ${KEY_VAULT_NAME} with actual vault name when deploying
      # Or use kustomize/ArgoCD to template this value
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: book-review-secrets
  namespace: book-review-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: SecretStore
  target:
    name: book-review-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: db-password
    - secretKey: DB_PASSWORD
      remoteRef:
        key: db-password
    - secretKey: JWT_SECRET
      remoteRef:
        key: jwt-secret
