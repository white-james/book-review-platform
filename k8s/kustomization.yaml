apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: book-review-platform

resources:
  - namespace.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - book-api-deployment.yaml
  - book-api-service.yaml
  - book-ui-deployment.yaml
  - book-ui-service.yaml
  - ingress.yaml
  - external-secret.yaml

# Replace the Key Vault name placeholder with actual value
replacements:
  - source:
      kind: ConfigMap
      name: vault-config
      fieldPath: data.VAULT_NAME
    targets:
      - select:
          kind: SecretStore
        fieldPaths:
          - spec.provider.azurekv.vaultUrl
        options:
          delimiter: "."
          index: 0

configMapGenerator:
  - name: vault-config
    literals:
      # Set this to your Key Vault name after running terraform
      # Get it from: terraform output -raw key_vault_name
      - VAULT_NAME=REPLACE_WITH_VAULT_NAME
