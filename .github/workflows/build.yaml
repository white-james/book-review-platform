name: Build and Push Image

on:
  push:
    branches:
      - main
      - feature/*

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: "{{defaultContext}}:book-ui"
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/book-ui:v1.0.0

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: "{{defaultContext}}:book-api"
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/book-api:v1.0.0

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: "{{defaultContext}}:database"
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/book-db:v1.0.0