apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: book-review-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/white-james/book-review-platform.git
    targetRevision: HEAD
    path: kubernetes-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: book-review-platform
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true